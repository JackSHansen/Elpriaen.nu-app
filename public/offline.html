<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - ElPriser.nu</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #201e1e;
        color: #ebebeb;
        font-family: Roboto, system-ui, -apple-system, sans-serif;
      }
      .card {
        width: min(32rem, 90vw);
        background: #27282b;
        border-radius: 12px;
        padding: 1.2rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      h1 {
        margin-top: 0;
        color: #55ec20;
      }
      p {
        line-height: 1.4;
        color: #d4d5d8;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Du er offline</h1>
      <p>ElPriser.nu kunne ikke hente nye data lige nu. Prøv igen når du har internetforbindelse.</p>
    </article>
  </body>
</html>
